<!DOCTYPE html>
<html>
<head>
  <style>
    body { background: #f0f0f0; padding: 50px; }
    svg { width: 500px; height: 300px; border: 1px solid #ccc; background: white; }
  </style>
</head>
<body>
  <svg viewBox="0 0 500 260">
    <!-- Left Hand -->
    <rect x="50" y="150" width="130" height="90" rx="30" fill="#e5e7eb" stroke="#9ca3af" stroke-width="2"/>
    <rect x="50" y="100" width="25" height="80" rx="12" fill="#e5e7eb" stroke="#9ca3af" stroke-width="2" />
    <rect x="85" y="70" width="25" height="110" rx="12" fill="#e5e7eb" stroke="#9ca3af" stroke-width="2" />
    <rect x="120" y="50" width="25" height="130" rx="12" fill="#4CAF50" stroke="#9ca3af" stroke-width="2" />
    <rect x="155" y="70" width="25" height="110" rx="12" fill="#e5e7eb" stroke="#9ca3af" stroke-width="2" />
    <rect x="155" y="160" width="25" height="70" rx="12" transform="rotate(-45 155 160)" fill="#e5e7eb" stroke="#9ca3af" stroke-width="2" />

    <!-- Right Hand -->
    <rect x="320" y="150" width="130" height="90" rx="30" fill="#e5e7eb" stroke="#9ca3af" stroke-width="2"/>
    <rect x="320" y="70" width="25" height="110" rx="12" fill="#e5e7eb" stroke="#9ca3af" stroke-width="2" />
    <rect x="355" y="50" width="25" height="130" rx="12" fill="#e5e7eb" stroke="#9ca3af" stroke-width="2" />
    <rect x="390" y="70" width="25" height="110" rx="12" fill="#e5e7eb" stroke="#9ca3af" stroke-width="2" />
    <rect x="425" y="100" width="25" height="80" rx="12" fill="#e5e7eb" stroke="#9ca3af" stroke-width="2" />
    <rect x="320" y="160" width="25" height="70" rx="12" transform="rotate(45 320 160)" fill="#e5e7eb" stroke="#9ca3af" stroke-width="2" />
  </svg>
</body>
</html>
